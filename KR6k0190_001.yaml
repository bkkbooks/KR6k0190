body:
  text: 唐三藏法師義淨撰每於半月月盡憶所犯罪準法而説或故妄語或飲酒或非時食等或請香不淨洗手而食每於旦朝或復餘時不觀水而飲用不如法放生故斷衆生命自壞生地或教他壞不作知淨語於五生種不以火等作淨而便食用鉢碗不淨洗而食銅碗匙筯不以灰揩而食凡是銅器皆以灰揩方淨若以澡豆水洗不得成淨或飲用殘宿惡觸瓶水及殘宿惡觸刀子割餅等而食非時飲不淨茶湯酥蜜等水食五正食已捨威儀竟吞咽餘津自受捉金銀錢寶及使人受捉不作知淨語凡觸火不持心燒香等觸火不持心非時入聚落不白苾芻與未受具人同室宿過二夜與未受具人同誦及同聲唱佛此等波逸底迦罪據數犯者言之餘皆準此罪應三説又每旦及大食後不嚼木或向塔嚼齒木等用訖不洗而棄在僧淨地中洟唾或棄蚤虱等不依處所或食時飲噉作聲或食時含食語話或齧半食與未受大戒人同床席坐臥或立小便或大小便不洗淨大小便時嗽口吐水及洟唾棄齒木皆不彈指謦咳污手捉飲食器不淨洗手嗽口飲水等非時食蜜不以水滴作淨或觀男子及以女人不善持心而生欲想或自觸身起愛染心或不繫想光明縱心眠睡在燈燭光下眠臥雖有開緣若觸火等不持心或於三寶師僧父母所起不尊重心及生瞋忿而不忍受滅燈火不持心此等皆是惡作罪且隨要言之若更有餘者隨所憶罪此等皆須對人一説而悔或有責心者云何責心凡出家者於不謹慎心中違律教時即須自責心云此事是我所不應作我從今已去更不如是若常能如此自剋責時自然不虧諸戒須知佛教意在如此又凡出家受十戒及大戒已去一一事皆白親教師或軌範師唯除五事不須言白云何為五謂大小便利飲淨水嚼齒木同一界內齊四十九尋內禮佛繞塔餘皆須白若不白師者一一皆得惡作罪凡至褒灑陀日應對不同犯清淨苾芻隨其大小而為敬儀蹲踞合掌憶其罪名作如是説具壽存念我苾芻某甲有故妄語等隨其犯者稱之犯衆多根本波逸底迦罪及衆多方便惡作罪或不嚼齒木等隨有稱之犯衆多根本惡作罪及衆多方便惡作罪此等諸罪各有不敬聖教波逸底迦罪及此方便惡作罪并不向人發露各有覆藏罪此所犯罪我今於具壽前從清淨來並皆發露不作覆藏由發露已便得安樂三説已彼應問言汝見罪不答言我見又問將來諸戒能善護不答言能護所對苾芻應云奧箄迦梵語此義翻為方便由作此事是解脫之方便也其説罪者答言娑度此云善哉若犯僧伽伐尸沙罪者但且對人發露後別行法若犯窣吐羅及犯捨墮罪準法除之每食罷發願法準如律教若苾芻食了之時若須誦持欹拏伽他謂施頌也隨於靜處或坐或立或可經行先誦小經一紙半紙次誦伽他云飯食已訖當願衆生德行充盈成十種力所為布施者必獲其義利若為樂故施後必得安樂諸以寺舍房宇布施衆僧造寺之主及護寺天神國主百僚師僧父母因緣眷屬及一切衆生若先亡者願生西方見阿彌陀佛或生覩史多天見慈氏尊者脫屣塵勞悟無生忍其現存者願無病長壽福智莊嚴願我自身無諸障惱常持淨戒不犯尸羅於小罪中心生大懼於所犯罪悉皆發露盡未來際不失信心逢善知識願生中國離於八難常存正見至求解脫恆與衆生作不請之友即以此福普施一切同出有流證無上果若於每日不作如是念誦發願者是懈怠人不銷信施洗淨法其大小便室必須別處各安門扇并置橫串凡入小行室及上廁時法合持瓶勿口含水用為洗淨謦咳彈指或再或三方始前進亦既入已却串門扇持土兩塊或灰一抄半用洗身半洗左手筒槽帛拂皆非本儀既出廁外其瓶可置三叉木上注水向身或安於脾令水斜出若無瓶時盆子盛水權充亦得以土十五塊安在右邊地上或磚版上七塊偏洗左手七塊兩手俱洗餘有一在將洗瓶器其磚版上即須淨洗然後安置觸瓶取淨瓶水漱口三度方合淨儀始得受禮禮他虔敬三寶坐諸床席讀誦尊經若不如是依律行者凡有所為咸招惡作之罪或在行路及乘船時任量事斟酌希諸行者知是聖教勿輕灰覆終墮泥犁奉持獲福輕法罪生此既常事告示分明
